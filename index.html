<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fattoria di Pilarciano</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      background: url("SFONDO_ChatGPT Image 17 giu 2026, 09_06_27.png") center/cover no-repeat;
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr minmax(280px, 520px) 1fr;
      align-items: center;
      gap: 20px;
      padding: 20px;
    }

    .collage {
      display: grid;
      gap: 14px;
    }

    .collage img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 22px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.25);
    }

    .center {
      text-align: center;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(4px);
      border-radius: 32px;
      padding: 24px 18px;
      box-shadow: 0 10px 35px rgba(0,0,0,0.18);
    }

    .logo {
      width: 190px;
      max-width: 70%;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      color: #8b1430;
      font-size: clamp(34px, 6vw, 70px);
      line-height: 1.05;
      text-transform: uppercase;
      text-shadow: 2px 2px 0 #ffffff, 4px 4px 0 rgba(0,0,0,0.12);
    }

    .social {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 22px;
    }

    .social img {
      width: 58px;
      height: 58px;
      object-fit: contain;
      transition: transform 0.2s ease;
    }

    .social img:hover {
      transform: scale(1.12);
    }

    @media (max-width: 800px) {
      body {
        overflow-y: auto;
      }

      .page {
        grid-template-columns: 1fr;
        padding: 12px;
        gap: 10px;
      }

      .collage {
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .collage img {
        height: 82px;
        border-radius: 14px;
      }

      .center {
        padding: 16px 12px;
        border-radius: 24px;
      }

      .logo {
        width: 135px;
        margin-bottom: 8px;
      }

      h1 {
        font-size: clamp(32px, 10vw, 48px);
      }

      .social {
        margin-top: 14px;
      }

      .social img {
        width: 48px;
        height: 48px;
      }
    }
  </style>
</head>

<body>
  <main class="page">

    <div class="collage">
      <img src="FOTO (10).jpeg" alt="">
      <img src="FOTO (1).jpeg" alt="">
      <img src="FOTO (2).jpeg" alt="">
      <img src="FOTO (3).jpeg" alt="">
    </div>

    <section class="center">
      <img class="logo" src="LOGO_Fattoria di Pilarciano LOGO_mezzo sfondo.png" alt="Fattoria di Pilarciano">

      <h1>
        Torna<br>
        l'ortolano in<br>
        Piazza Giotto
      </h1>

      <div class="social">
        <a href="https://www.facebook.com/share/1BfWrjPGuH/?mibextid=wwXIfr" target="_blank">
          <img src="FB.png" alt="Facebook">
        </a>

        <a href="https://www.instagram.com/fattoriadipilarciano?igsh=cnp6ZTkwNnB0NGsy" target="_blank">
          <img src="IG.png" alt="Instagram">
        </a>
      </div>
    </section>

    <div class="collage">
      <img src="FOTO (4).jpeg" alt="">
      <img src="FOTO (5).jpeg" alt="">
      <img src="FOTO (6).jpeg" alt="">
      <img src="FOTO (7).jpeg" alt="">
    </div>

  </main>
</body>
</html>
